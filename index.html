<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Level Up Code</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── HEADER ── -->
  <header role="banner">
    <div class="logo">LEVEL <span>UP</span> CODE</div>
    <nav class="hud" aria-label="Player stats">
      <div class="hud-badge hud-xp" aria-label="XP">
        <span class="hud-icon" aria-hidden="true">⚡</span>
        <span class="hud-num" id="hud-xp">0</span>
      </div>
      <div class="hud-badge hud-streak" id="streak-badge" aria-label="Streak">
        <span class="hud-icon" aria-hidden="true">🔥</span>
        <span class="hud-num" id="hud-streak">0</span>
      </div>
      <div class="rank-pill" id="rank-pill" aria-label="Rank">Newbie</div>
    </nav>
  </header>

  <!-- ── PATH VIEW ── -->
  <main id="path-view" aria-label="Learning path">
    <p class="path-title">YOUR PATH</p>
    <div class="path-wrap" id="path-wrap" role="list" aria-label="Level nodes">
      <!-- Nodes injected by main.js -->
    </div>
    <button class="reset-btn" id="reset-btn" aria-label="Reset all progress">Reset my progress</button>
  </main>

  <!-- ── LEVEL VIEW ── -->
  <div id="level-view" aria-live="polite">
    <button class="back-btn" id="back-btn" aria-label="Back to learning path">
      ← Back to path
    </button>
    <div id="level-content"></div>
  </div>

  <!-- ── SUCCESS OVERLAY ── -->
  <div class="success-overlay" id="success-overlay" role="dialog" aria-modal="true" aria-labelledby="success-heading">
    <div class="success-card">
      <div class="success-icon" aria-hidden="true">🏆</div>
      <div class="success-xp" id="success-xp-text" aria-live="polite">+20 XP</div>
      <h2 id="success-heading">Level complete!</h2>
      <p class="success-msg" id="success-msg">Great work. The next level is now unlocked.</p>
      <button class="next-btn" id="next-btn">Continue →</button>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="main.js"></script>
</body>
</html>
